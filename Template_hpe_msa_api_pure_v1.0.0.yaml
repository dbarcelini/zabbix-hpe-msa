        # =====================================================================
        # 6. DESCOBERTA DE PORTAS ESTRUTURAIS
        # =====================================================================
        - uuid: 8d2c4620f4b341909a35e76a6cfbe422
          name: 'HPE MSA - Descoberta de Portas FC / iSCSI'
          type: DEPENDENT
          key: msa.api.ports.discovery
          delay: '0'
          master_item:
            key: 'zbx-hpmsa.py["--ssl","direct","-a","{$API.VER}","-u","{$MSA.USERNAME}","-p","{$MSA.PASSWORD}","full","{HOST.CONN}","ports"]'
          lifetime: 1d
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  var data = JSON.parse(value);
                  var lld = [];
                  for (var key in data) {
                      var port = data[key];
                      if (port && (port["h"] === 0 || port["h"] === "0" || port["status"] === "Up" || port["status"] === 0)) {
                          lld.push({ "{#PORT.ID}": key });
                      }
                  }
                  return JSON.stringify(lld);
          item_prototypes:
            - uuid: 3bd493f1cae047f08d4b2938cf1e5b25
              name: 'Porta {#PORT.ID}: Status do Link'
              type: DEPENDENT
              key: 'msa.api.port["{#PORT.ID}","status"]'
              history: '{$HISTORY}'
              trends: '0'
              value_type: FLOAT
